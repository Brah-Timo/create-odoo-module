[options]
; Odoo configuration for local Docker development
; Generated by create-odoo-module — https://create-odoo-module.dev

; ── Database ─────────────────────────────────────────────────────────────────
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

; ── Server ───────────────────────────────────────────────────────────────────
http_interface = 0.0.0.0
http_port = 8069
longpolling_port = 8072
proxy_mode = False

; ── Addons paths ─────────────────────────────────────────────────────────────
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; ── Logging ──────────────────────────────────────────────────────────────────
logfile = False
log_level = info

; ── Developer mode ───────────────────────────────────────────────────────────
dev_mode = all

; ── Performance ──────────────────────────────────────────────────────────────
workers = 0
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 60
limit_time_real = 120
